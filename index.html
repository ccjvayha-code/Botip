<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xác Thực Bảo Mật</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #ecf0f1; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header-icon { font-size: 40px; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; color: var(--primary); }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .captcha-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #bdc3c7; }
        .math-question { font-size: 22px; font-weight: bold; color: var(--primary); letter-spacing: 2px; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        .btn-verify { width: 100%; padding: 12px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-verify:hover { transform: translateY(-2px); opacity: 0.9; }
        .loading { display: none; font-size: 14px; color: #95a5a6; margin-top: 10px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">🛡️</div>
        <h3>Xác Thực Bảo Mật</h3>
        <p>Vui lòng hoàn thành captcha để tiếp tục sử dụng Bot.</p>
        
        <div class="captcha-box">
            <div style="font-size: 12px; color: #95a5a6; margin-bottom: 5px;">Trả lời câu hỏi sau:</div>
            <div class="math-question" id="mathQuestion">? + ? = ?</div>
        </div>

        <input type="number" id="answerInput" placeholder="Nhập kết quả..." autocomplete="off">
        
        <button class="btn-verify" onclick="verifyCaptcha()">✅ Xác Nhận Ngay</button>
        
        <div class="loading" id="loadingStatus">
            <div class="spinner"></div> Đang kiểm tra IP...
        </div>
    </div>

    <script>
        // Khởi tạo Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // Biến toàn cục
        let correctAnswer = 0;

        // Tạo toán tử ngẫu nhiên
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = num1 + num2;
            document.getElementById('mathQuestion').innerText = `${num1} + ${num2} = ?`;
        }
        generateCaptcha();

        // Hàm lấy IP (Sử dụng API public ipify)
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return "Unknown_IP";
            }
        }

        // Xử lý khi bấm nút xác nhận
        async function verifyCaptcha() {
            const userAns = document.getElementById('answerInput').value;
            const statusDiv = document.getElementById('loadingStatus');
            const btn = document.querySelector('.btn-verify');

            // 1. Kiểm tra Captcha
            if (parseInt(userAns) !== correctAnswer) {
                alert('❌ Sai đáp án! Vui lòng thử lại.');
                generateCaptcha(); // Đổi câu hỏi mới
                document.getElementById('answerInput').value = '';
                return;
            }

            // 2. Bắt đầu xử lý
            btn.disabled = true;
            btn.innerText = '⏳ Đang xử lý...';
            statusDiv.style.display = 'block';

            // 3. Lấy IP
            const ipAddress = await getUserIP();
            
            // 4. Gửi dữ liệu về Bot
            // Dữ liệu này sẽ được Bot nhận thông qua webhook hoặc logic inline
            const dataToSend = {
                action: "verify_captcha",
                ip: ipAddress,
                user_id: tg.initDataUnsafe.user.id,
                first_name: tg.initDataUnsafe.user.first_name
            };

            // Gửi dữ liệu về Bot để xử lý logic (check IP trùng, etc)
            // Sử dụng tg.sendData để đóng WebApp và gửi dữ liệu về chat với Bot
            tg.sendData(JSON.stringify(dataToSend));
        }
    </script>
</body>
</html>
